include-file = ~/.config/polybar/colors-polybar.ini

[bar/example]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Cantarell;2
font-1 = Font Awesome 6

modules-left = xworkspaces menu-apps
modules-right = net-type ip-addr cpu-temp cpu gpu-temp gpu-load gpu-fan memory filesystem volume date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

; [module/menu-apps]
; type = custom/menu

; menu-0-0 = %{T1}Firefox%{T-}
; menu-0-0-exec = firefox
; menu-0-1 = Terminal
; menu-0-1-exec = alacritty
; menu-0-2 = File Manager
; menu-0-2-exec = thunar
; menu-0-3 = Settings
; menu-0-3-exec = xfce4-settings-manager
; menu-0-4 = Search
; menu-0-4-exec = rofi -show drun

; label-open = "  Apps"
; label-close = "  X"

; label-separator = "   |   "

;[module/xwindow]
;type = internal/xwindow
;label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Sound "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Memory "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y/%m/%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/net-type]
type = custom/script
exec = ~/.config/polybar/scripts/net_type.sh
interval = 5
label = %output%

[module/ip-addr]
type = custom/script
exec = ~/.config/polybar/scripts/ip_addr.sh
interval = 5
label = %output%

[module/cpu]
type = internal/cpu
interval = 1
label = CPU %percentage%%

[module/cpu-temp]
type = custom/script
exec = ~/.config/polybar/scripts/cpu_temp.sh
interval = 2
label = CPU %output%

[module/gpu-temp]
type = custom/script
exec = ~/.config/polybar/scripts/gpu_temp.sh
interval = 2
label = GPU %output%

[module/gpu-load]
type = custom/script
exec = ~/.config/polybar/scripts/gpu_load.sh
interval = 2
label = GPU %output%

[module/gpu-fan]
type = custom/script
exec = ~/.config/polybar/scripts/gpu_fan.sh
interval = 5
label = GPU FAN %output%

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
label-mounted = disk %percentage_used%%
label-unmounted = DISK N/A

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 1
click-left = pamixer --toggle-mute
scroll-up = pamixer --increase 5
scroll-down = pamixer --decrease 5
format = <label>
label = VOL %output%

[settings]
screenchange-reload = true
# false: picom handles real compositing; true would freeze a wallpaper snapshot behind the bar border
pseudo-transparency = false